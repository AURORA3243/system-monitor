name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: docker build -t aurora3243/system-monitor:latest .

      - name: Push to Docker Hub
        run: docker push aurora3243/system-monitor:latest

      - name: Tag with commit SHA
        run: |
          docker tag aurora3243/system-monitor:latest aurora3243/system-monitor:${{ github.sha }}
          docker push aurora3243/system-monitor:${{ github.sha }}
