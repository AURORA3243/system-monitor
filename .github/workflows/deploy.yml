name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build image
        run: docker build -t aurora3243/system-monitor:latest .

      - name: Push to Docker Hub
        run: docker push aurora3243/system-monitor:latest

      - name: Tag with commit SHA
        run: |
          docker tag aurora3243/system-monitor:latest aurora3243/system-monitor:${{ github.sha }}
          docker push aurora3243/system-monitor:${{ github.sha }}
